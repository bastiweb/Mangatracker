<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="title_login">Manga Tracker - Login</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/i18n.js" defer></script>
    <script src="/theme.js" defer></script>
    <script src="/login.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="/">Manga Tracker</a>
        <div class="spacer"></div>
        <button id="lang-toggle" class="secondary" type="button">EN</button>
        <button id="theme-toggle" class="secondary" type="button" aria-pressed="false">Darkmode</button>
      </div>
    </header>

    <main class="container page-grid">
      <section class="panel auth-panel">
        <h1 data-i18n="heading_login">Login</h1>
        <form id="login-form">
          <label for="identifier" data-i18n="label_login_identifier">E-Mail oder Benutzername</label>
          <input
            id="identifier"
            name="identifier"
            type="text"
            autocomplete="username"
            data-i18n-placeholder="placeholder_login_identifier"
            placeholder="E-Mail oder Benutzername"
            required
          />

          <label for="password" data-i18n="label_password">Passwort</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />

          <div class="actions">
            <button type="submit" data-i18n="btn_login">Einloggen</button>
          </div>
        </form>

        <p id="message" class="message" aria-live="polite"></p>
        <p id="register-hint" class="muted" hidden>
          <span data-i18n="register_hint_text">Noch kein Konto?</span>
          <a href="/register" data-i18n="register_hint_link">Registrieren</a>
        </p>
      </section>
    </main>
  </body>
</html>
