<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manga Tracker - Registrierung</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/theme.js" defer></script>
    <script src="/register.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="/">Manga Tracker</a>
        <div class="spacer"></div>
        <button id="theme-toggle" class="secondary" type="button" aria-pressed="false">Darkmode</button>
      </div>
    </header>

    <main class="container page-grid">
      <section class="panel auth-panel">
        <h1>Registrierung</h1>
        <form id="register-form">
          <label for="email">E-Mail</label>
          <input id="email" name="email" type="email" autocomplete="email" required />

          <label for="password">Passwort</label>
          <input id="password" name="password" type="password" autocomplete="new-password" required />

          <label for="passwordConfirm">Passwort wiederholen</label>
          <input
            id="passwordConfirm"
            name="passwordConfirm"
            type="password"
            autocomplete="new-password"
            required
          />

          <div id="role-field" hidden>
            <label for="role">Rolle</label>
            <select id="role" name="role">
              <option value="user" selected>Nutzer</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <div class="actions">
            <button type="submit">Registrieren</button>
            <a class="button-link secondary" href="/login.html">Zurück zum Login</a>
          </div>
        </form>

        <p id="message" class="message" aria-live="polite"></p>
      </section>
    </main>
  </body>
</html>
