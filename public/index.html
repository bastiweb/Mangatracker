<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manga Tracker - Erfassung</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/theme.js" defer></script>
    <script src="/auth.js" defer></script>
    <script src="/create.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="/">Manga Tracker</a>
        <nav class="nav-links">
          <a href="/">Übersicht</a>
          <a class="active" href="/create">Erfassen</a>
          <a href="/settings">Settings</a>
        </nav>
        <div class="user-panel">
          <span id="user-email" class="muted"></span>
          <span id="admin-badge" class="badge admin-badge" hidden>Admin</span>
          <button id="logout-btn" class="secondary" type="button">Logout</button>
        </div>
        <button id="theme-toggle" class="secondary" type="button" aria-pressed="false">Darkmode</button>
      </div>
    </header>

    <main class="container page-grid">
      <section class="panel">
        <h1 id="form-title">Neue Manga-Serie anlegen</h1>
        <form id="manga-form">
          <input type="hidden" id="manga-id" />

          <label for="title">Titel</label>
          <input id="title" name="title" required maxlength="120" />

          <label class="checkbox-inline" for="isBook">
            <input id="isBook" name="isBook" type="checkbox" />
            <span>Als Buch speichern (ohne Band-Tracking)</span>
          </label>

          <div id="volume-fields" class="grid-2">
            <div>
              <label for="ownedVolumes">Vorhandene Bände</label>
              <input id="ownedVolumes" name="ownedVolumes" type="number" min="0" required value="0" />
            </div>
            <div>
              <label for="totalVolumes">Gesamtzahl Bände (optional)</label>
              <input id="totalVolumes" name="totalVolumes" type="number" min="0" />
            </div>
          </div>

          <label for="status">Status</label>
          <select id="status" name="status">
            <option value="Geplant">Geplant</option>
            <option value="Sammle" selected>Sammle</option>
            <option value="Pausiert">Pausiert</option>
            <option value="Abgeschlossen">Abgeschlossen</option>
          </select>

          <label for="notes">Notizen</label>
          <textarea id="notes" name="notes" rows="4" maxlength="600"></textarea>

          <section class="embedded-section">
            <div class="embedded-header">
              <h2>Hardcover-Verknüpfung</h2>
              <small>Suche nach Titel/Autor und wähle den passenden Treffer.</small>
            </div>

            <div class="search-row">
              <input id="hardcover-query" placeholder="z. B. One Piece" />
              <button id="hardcover-search-btn" type="button">Hardcover suchen</button>
            </div>

            <div id="hardcover-results" class="hardcover-results"></div>

            <div id="selected-hardcover" class="selected-hardcover empty">
              Noch keine Hardcover-Verknüpfung ausgewählt.
            </div>

            <div class="actions">
              <button id="clear-hardcover-btn" class="secondary" type="button">Verknüpfung entfernen</button>
            </div>
          </section>

          <div class="actions">
            <button id="save-btn" type="submit">Speichern</button>
            <button id="cancel-edit-btn" class="secondary" type="button" hidden>Bearbeitung abbrechen</button>
          </div>
        </form>
        <p id="message" class="message" aria-live="polite"></p>
      </section>

      <section class="panel">
        <h2>Schnellzugriff</h2>
        <p class="muted">Zur Übersicht mit Suche, Sortierung und Filterung:</p>
        <a class="button-link" href="/">Zur Übersicht</a>
      </section>
    </main>
  </body>
</html>
