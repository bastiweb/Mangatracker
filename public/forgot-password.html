<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="title_forgot_password">Manga Tracker - Passwort vergessen</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/i18n.js" defer></script>
    <script src="/theme.js" defer></script>
    <script src="/forgot-password.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="/">Manga Tracker</a>
        <div class="spacer"></div>
        <button id="lang-toggle" class="secondary" type="button">EN</button>
        <button id="theme-toggle" class="secondary" type="button" aria-pressed="false">Darkmode</button>
      </div>
    </header>

    <main class="container page-grid">
      <section class="panel auth-panel">
        <h1 data-i18n="heading_forgot_password">Admin-Passwort zurücksetzen</h1>
        <p class="muted" data-i18n="forgot_password_desc">
          Nutze den Notfall-Reset-Key aus der Server-Konfiguration.
        </p>

        <form id="forgot-password-form">
          <label for="identifier" data-i18n="label_login_identifier">E-Mail oder Benutzername</label>
          <input
            id="identifier"
            name="identifier"
            type="text"
            autocomplete="username"
            data-i18n-placeholder="placeholder_login_identifier"
            placeholder="E-Mail oder Benutzername"
            required
          />

          <label for="reset-key" data-i18n="label_reset_key">Reset-Key</label>
          <input id="reset-key" name="resetKey" type="password" autocomplete="off" required />

          <label for="new-password" data-i18n="label_new_password">Neues Passwort</label>
          <input id="new-password" name="newPassword" type="password" autocomplete="new-password" required />

          <label for="new-password-confirm" data-i18n="label_password_confirm">Passwort wiederholen</label>
          <input
            id="new-password-confirm"
            name="newPasswordConfirm"
            type="password"
            autocomplete="new-password"
            required
          />

          <div class="actions">
            <button type="submit" data-i18n="btn_reset_password_public">Passwort zurücksetzen</button>
          </div>
        </form>

        <p id="message" class="message" aria-live="polite"></p>
        <p class="muted">
          <a href="/login" data-i18n="back_login">Zurück zum Login</a>
        </p>
      </section>
    </main>
  </body>
</html>
