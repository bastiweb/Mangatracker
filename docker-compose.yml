services:
  manga-tracker:
    build: .
    container_name: manga-tracker
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3003}
      - DB_FILE=${DB_FILE:-/data/manga.db}
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY}
      - BACKUP_ENABLED=${BACKUP_ENABLED:-true}
      - BACKUP_INTERVAL_MINUTES=${BACKUP_INTERVAL_MINUTES:-1440}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-14}
      - BACKUP_DIR=${BACKUP_DIR:-/backups}
      - TRUST_PROXY=${TRUST_PROXY:-true}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-https://localhost,https://mangatracker.local}
    volumes:
      - manga_data:/data
      - ./backups:/backups
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3003/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: manga-tracker-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      manga-tracker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:2019/config/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  manga_data:
  caddy_data:
  caddy_config:
